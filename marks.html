<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D9534F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Marks | Student Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .split-layout { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 768px) { .split-layout { grid-template-columns: 1.3fr 1fr; } }
        
        .fraction-input { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .fraction-input input { width: 100%; text-align: center; font-size: 1.1rem; padding: 10px; font-family: inherit; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text-main); }
        .fraction-input input:focus { outline: none; border-color: var(--primary); }
        
        .scale-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .scale-table th { border-bottom: 2px solid var(--border); padding-bottom: 10px; color: var(--text-main); }
        .scale-table td { padding: 10px 0; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .scale-table tr:last-child td { border-bottom: none; }
        
        .scale-table th:nth-child(1), .scale-table td:nth-child(1) { text-align: left; padding-left: 10px; width: 25%; }
        .scale-table th:nth-child(2), .scale-table td:nth-child(2) { text-align: center; width: 50%; }
        .scale-table th:nth-child(3), .scale-table td:nth-child(3) { text-align: right; padding-right: 10px; width: 25%; }
        
        select.styled-select {
            width: 100%; padding: 10px; border-radius: 8px; font-family: inherit; font-size: 1rem;
            background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--border);
        }
    </style>
</head>
<body data-theme="light">
    <div class="dashboard" style="max-width: 1000px; padding: 20px; margin: 0 auto; box-sizing: border-box;">
        
        <div class="top-nav-bar">
            <a href="index.html" class="btn-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Back
            </a>
            
            <button id="theme-toggle" class="btn-dark-mode" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="margin: 0; font-size: 2.2rem; color: var(--text-main);">Target Marks Calculator</h1>
            <span class="subtitle">Predict your final targets or reverse-calculate missing marks</span>
        </header>

        <main class="content-area" style="display: block !important; background: transparent; border: none; box-shadow: none; padding: 0;">
            <div class="split-layout">
                
                <div class="card-section" style="margin: 0;">
                    <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px;">
                        <div>
                            <label style="font-weight: bold; color: var(--primary); display: block; margin-bottom: 8px;">1. Select Subject</label>
                            <select id="marks-subject" class="styled-select" onchange="renderInterface()">
                                <option value="">-- Choose Subject --</option>
                                <option value="BMIT3084">BMIT3084 Enterprise Networking</option>
                                <option value="BMIT2203">BMIT2203 Human Computer Interaction</option>
                                <option value="BMCS2053">BMCS2053 Object-Oriented Analysis</option>
                                <option value="BMIT2183">BMIT2183 Software Security</option>
                                <option value="BMIT3143">BMIT3143 Digital Forensics</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-weight: bold; color: var(--primary); display: block; margin-bottom: 8px;">2. Calculator Mode</label>
                            <select id="calc-mode" class="styled-select" onchange="renderInterface()" style="border-color: var(--primary);">
                                <option value="mode-final">Predict Final Exam Targets</option>
                                <option value="mode-reverse">Find Missing Component Score</option>
                            </select>
                        </div>
                    </div>
                    <div id="dynamic-input-container"></div>
                </div>
                
                <div>
                    <div id="marks-result-section" class="card-section" style="display: none; margin: 0 0 25px 0;">
                        <div id="dynamic-result-container"></div>
                    </div>

                    <div class="card-section" style="margin: 0;">
                        <h3 style="margin: 0 0 15px 0; font-size: 1.1rem; text-align: center; color: var(--text-main);">TAR UMT Grading Scale</h3>
                        <table class="scale-table">
                            <thead>
                                <tr><th>Grade</th><th>Marks (%)</th><th>Grade Point</th></tr>
                            </thead>
                            <tbody>
                                <tr><td><strong style="color: var(--text-main);">A</strong></td><td>80 - 100</td><td>4.00</td></tr>
                                <tr><td><strong style="color: var(--text-main);">A-</strong></td><td>75 - 79</td><td>3.67</td></tr>
                                <tr><td><strong style="color: var(--text-main);">B+</strong></td><td>70 - 74</td><td>3.33</td></tr>
                                <tr><td><strong style="color: var(--text-main);">B</strong></td><td>65 - 69</td><td>3.00</td></tr>
                                <tr><td><strong style="color: var(--text-main);">B-</strong></td><td>60 - 64</td><td>2.67</td></tr>
                                <tr><td><strong style="color: var(--text-main);">C+</strong></td><td>55 - 59</td><td>2.33</td></tr>
                                <tr><td><strong style="color: var(--text-main);">C</strong></td><td>50 - 54</td><td>2.00</td></tr>
                                <tr><td><strong style="color: var(--danger);">F</strong></td><td>0 - 49</td><td>0.00</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
