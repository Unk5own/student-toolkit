<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA & CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>GPA & CGPA Calculator</h1>

        <div class="tabs">
            <button class="tab-link active" onclick="openTab('gpa-tab')">Semester GPA</button>
            <button class="tab-link" onclick="openTab('cgpa-tab')">Overall CGPA</button>
        </div>

        <div id="gpa-tab" class="tab-content active">
            <h3>Calculate Semester GPA</h3>
            <div id="course-list">
                <div class="input-group">
                    <input type="text" placeholder="Course Name">
                    <input type="number" class="credits" placeholder="Credits" min="1">
                    <select class="grade">
                        <option value="4.00">A or A+ (4.00)</option>
                        <option value="3.75">A- (3.75)</option>
                        <option value="3.50">B+ (3.50)</option>
                        <option value="3.00">B (3.00)</option>
                        <option value="2.75">B- (2.75)</option>
                        <option value="2.50">C+ (2.50)</option>
                        <option value="2.00">C (2.00)</option>
                        <option value="0.00">F (0.00)</option>
                    </select>
                </div>
            </div>
            <button class="btn-add" onclick="addRow()">+ Add Subject</button>
            <button class="btn-calc" onclick="calculateGPA()">Calculate GPA</button>
            <div class="result-box" id="gpa-result">
                Your Semester GPA: <span id="gpa-score">0.00</span>
            </div>
        </div>

        <div id="cgpa-tab" class="tab-content">
            <h3>Calculate CGPA</h3>
            <p class="instruction">Enter your current CGPA and total credits earned so far, then add your new semester
                results.</p>

            <div class="cgpa-inputs">
                <input type="number" id="prev-cgpa" placeholder="Current CGPA (e.g., 3.5)" step="0.01">
                <input type="number" id="prev-credits" placeholder="Total Credits Earned" min="1">
            </div>

            <div class="result-box" id="cgpa-result" style="display:block; margin-top:20px;">
                To calculate your new CGPA, first calculate your Semester GPA in the other tab!
                <br><br>
                <button class="btn-calc" onclick="calculateCGPA()">Calculate New CGPA</button>
                <br><br>
                <strong>New CGPA: <span id="cgpa-score">0.00</span></strong>
            </div>
        </div>

        <button class="btn-reset" onclick="location.reload()">Reset All</button>
    </div>

    <script src="script.js"></script>

</body>

</html>
