<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker | Student Toolkit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="dashboard" style="max-width: 800px; padding: 20px; margin: 0 auto; box-sizing: border-box;">
        
        <div class="top-nav-bar">
            <a href="index.html" class="btn-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Back
            </a>
            
            <button id="theme-toggle" class="btn-dark-mode" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>

        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="margin: 0; font-size: 2.2rem; color: var(--text-main);">Attendance Tracker</h1>
            <span class="subtitle">Track your safe skips and stay above the 80% limit</span>
        </header>

        <main class="content-area" style="display: block !important; background: transparent; border: none; box-shadow: none; padding: 0;">
            
            <div style="display: flex; border-bottom: 2px solid var(--border); margin-bottom: 25px;">
                <button id="tab-y2s2" onclick="switchTab('y2s2')" style="flex: 1; background: transparent; border: none; padding: 15px; color: var(--danger); font-weight: bold; font-size: 1.1rem; border-bottom: 3px solid var(--danger); cursor: pointer; transition: all 0.2s;">Y2S2 Timetable</button>
                <button id="tab-custom" onclick="switchTab('custom')" style="flex: 1; background: transparent; border: none; padding: 15px; color: var(--text-muted); font-weight: bold; font-size: 1.1rem; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s;">Custom Subjects</button>
            </div>

            <div id="y2s2-container"></div>
            
            <div id="custom-container" style="display: none;">
                </div>

            <div style="text-align: center; margin-top: 40px; padding-bottom: 20px;">
                <button onclick="resetAttendance()" class="btn-delete" style="padding: 10px 20px; font-size: 1rem; border-radius: 8px;">
                    🚨 Reset All Attendance Data
                </button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
